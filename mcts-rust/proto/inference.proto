syntax = "proto3";
package inference;


service Inference {
    rpc infer(InferenceRequest) returns (InferenceResponse);
    rpc grader(GraderRequest) returns (GraderResponse);
    rpc get_prompt(GetPromptRequest) returns (GetPromptResponse);
}

message InferenceRequest {
    repeated uint64 state = 1;
}

message InferenceResponse {
    map<uint32, float> prior = 1;
    float value = 2;
    repeated uint64 new_state = 3;
}

message GraderRequest {
    repeated uint64 state = 1;
    uint32 episode_id = 2;
    uint32 prompt_id = 3;
}

message GraderResponse {
    float reward = 1;
}

message GetPromptRequest {
    uint32 worker_pool_id = 1;
}

message GetPromptResponse {
    uint32 prompt_id = 1;
    repeated uint64 problem = 2;
}